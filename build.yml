name: Build SAMP iOS Tweak

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-13

    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Set up Theos Environment
      run: |
        bash -c "$(curl -fsSL https://raw.githubusercontent.com/theos/theos/master/bin/install-theos)"
        echo "THEOS=~/theos" >> $GITHUB_ENV
        
    - name: Compile Tweak
      run: |
        export THEOS=~/theos
        make package FINALPACKAGE=1
        
    - name: Upload Compiled File
      uses: actions/actions/upload-artifact@v3
      with:
        name: SAMP_iOS_Binary
        path: packages/*.deb